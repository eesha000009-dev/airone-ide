name: Build Airone IDE

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with artifacts'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Use Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install airo_compiler (optional)
        shell: bash
        run: pip install airo-compiler 2>/dev/null || echo "airo_compiler not available on PyPI yet, using built-in TypeScript verifier"
        continue-on-error: true

      - name: Install dependencies
        shell: bash
        run: yarn --skip-integrity-check --network-timeout 100000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Electron binary
        shell: bash
        run: |
          echo "Ensuring Electron binary is available..."
          if [ -f "node_modules/electron/dist/version" ]; then
            echo "Electron binary already exists: $(cat node_modules/electron/dist/version)"
          else
            echo "Electron binary not found, downloading directly..."
            mkdir -p node_modules/electron/dist
            ELECTRON_VERSION="v39.8.7"
          cat > /tmp/download_electron.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          VERSION="v39.8.7"
          DIST_DIR="node_modules/electron/dist"
          if [ "$RUNNER_OS" = "Windows" ]; then
            FILE="electron-${VERSION}-win32-x64.zip"
          else
            FILE="electron-${VERSION}-linux-x64.zip"
          fi
          URL="https://github.com/electron/electron/releases/download/${VERSION}/${FILE}"
          echo "Downloading ${URL}..."
          curl -L --retry 3 -o /tmp/electron.zip "${URL}"
          echo "Extracting to ${DIST_DIR}..."
          unzip -o /tmp/electron.zip -d "${DIST_DIR}"
          echo "${VERSION#v}" > "${DIST_DIR}/version"
          echo "Downloaded Electron ${VERSION}"
          SCRIPT
          bash /tmp/download_electron.sh
          fi
          echo "Final Electron version: $(cat node_modules/electron/dist/version 2>/dev/null || echo 'FAILED')"

      - name: Build extensions
        shell: bash
        run: yarn build:extensions
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build application
        shell: bash
        run: yarn build:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugins
        shell: bash
        run: yarn download:plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Windows
        shell: bash
        run: yarn package:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist contents
        shell: bash
        run: |
          echo "=== Dist directory contents ==="
          ls -la applications/electron/dist/ 2>/dev/null || echo "dist dir not found"
          echo "=== Looking for latest.yml ==="
          find applications/electron/dist -name "latest*.yml" -type f 2>/dev/null || echo "No yml files found"

      - name: Generate latest.yml if missing
        shell: bash
        run: |
          DIST_DIR="applications/electron/dist"
          if [ ! -f "${DIST_DIR}/latest.yml" ]; then
            echo "latest.yml not found, generating it..."
            EXE_FILE=$(ls ${DIST_DIR}/*.exe 2>/dev/null | head -1)
            if [ -n "$EXE_FILE" ]; then
              EXE_NAME=$(basename "$EXE_FILE")
              EXE_SIZE=$(stat -c%s "$EXE_FILE" 2>/dev/null || wc -c < "$EXE_FILE")
              SHA512=$(sha512sum "$EXE_FILE" | cut -d' ' -f1)
              cat > "${DIST_DIR}/latest.yml" << EOF
          version: $(node -p "require('./applications/electron/package.json').version")
          files:
            - url: ${EXE_NAME}
              sha512: ${SHA512}
              size: ${EXE_SIZE}
          path: ${EXE_NAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'
          EOF
              echo "Generated latest.yml:"
              cat "${DIST_DIR}/latest.yml"
            else
              echo "WARNING: No exe file found in dist directory"
            fi
          else
            echo "latest.yml already exists:"
            cat "${DIST_DIR}/latest.yml"
          fi

      - name: Upload Windows Installer
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Windows
          path: |
            applications/electron/dist/*.exe
            applications/electron/dist/*.blockmap
            applications/electron/dist/latest.yml
          retention-days: 30

      - name: Upload Windows Installer (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Windows-PR
          path: |
            applications/electron/dist/*.exe
          retention-days: 5

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev libx11-dev libsecret-1-dev libfontconfig1

      - name: Use Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install airo_compiler (optional)
        run: pip install airo-compiler 2>/dev/null || echo "airo_compiler not available on PyPI yet, using built-in TypeScript verifier"
        continue-on-error: true

      - name: Install dependencies
        shell: bash
        run: yarn --skip-integrity-check --network-timeout 100000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Electron binary
        shell: bash
        run: |
          echo "Ensuring Electron binary is available..."
          if [ -f "node_modules/electron/dist/version" ]; then
            echo "Electron binary already exists: $(cat node_modules/electron/dist/version)"
          else
            echo "Electron binary not found, downloading directly..."
            mkdir -p node_modules/electron/dist
            VERSION="v39.8.7"
            FILE="electron-${VERSION}-linux-x64.zip"
            URL="https://github.com/electron/electron/releases/download/${VERSION}/${FILE}"
            echo "Downloading ${URL}..."
            curl -L --retry 3 -o /tmp/electron.zip "${URL}"
            echo "Extracting to node_modules/electron/dist..."
            unzip -o /tmp/electron.zip -d node_modules/electron/dist
            echo "39.8.7" > node_modules/electron/dist/version
            echo "Downloaded Electron ${VERSION}"
          fi
          echo "Final Electron version: $(cat node_modules/electron/dist/version 2>/dev/null || echo 'FAILED')"

      - name: Build extensions
        shell: bash
        run: yarn build:extensions
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build application
        shell: bash
        run: yarn build:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugins
        shell: bash
        run: yarn download:plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Linux
        shell: bash
        run: yarn package:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist contents
        shell: bash
        run: |
          echo "=== Dist directory contents ==="
          ls -la applications/electron/dist/ 2>/dev/null || echo "dist dir not found"
          echo "=== Looking for latest-linux.yml ==="
          find applications/electron/dist -name "latest*.yml" -type f 2>/dev/null || echo "No yml files found"

      - name: Generate latest-linux.yml if missing
        shell: bash
        run: |
          DIST_DIR="applications/electron/dist"
          if [ ! -f "${DIST_DIR}/latest-linux.yml" ]; then
            echo "latest-linux.yml not found, generating it..."
            APPIMAGE_FILE=$(ls ${DIST_DIR}/*.AppImage 2>/dev/null | head -1)
            if [ -n "$APPIMAGE_FILE" ]; then
              APPIMAGE_NAME=$(basename "$APPIMAGE_FILE")
              APPIMAGE_SIZE=$(stat -c%s "$APPIMAGE_FILE" 2>/dev/null || wc -c < "$APPIMAGE_FILE")
              SHA512=$(sha512sum "$APPIMAGE_FILE" | cut -d' ' -f1)
              cat > "${DIST_DIR}/latest-linux.yml" << EOF
          version: $(node -p "require('./applications/electron/package.json').version")
          files:
            - url: ${APPIMAGE_NAME}
              sha512: ${SHA512}
              size: ${APPIMAGE_SIZE}
          path: ${APPIMAGE_NAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'
          EOF
              echo "Generated latest-linux.yml:"
              cat "${DIST_DIR}/latest-linux.yml"
            else
              echo "WARNING: No AppImage file found in dist directory"
            fi
          else
            echo "latest-linux.yml already exists:"
            cat "${DIST_DIR}/latest-linux.yml"
          fi

      - name: Upload Linux AppImage
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Linux
          path: |
            applications/electron/dist/*.AppImage
            applications/electron/dist/*.deb
            applications/electron/dist/latest-linux.yml
          retention-days: 30

  build-android:
    name: Android Build
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: mobile
        run: npx vite build

      - name: Add Capacitor Android platform
        working-directory: mobile
        run: npx cap add android 2>/dev/null || echo "Android platform may already exist"

      - name: Sync Capacitor
        working-directory: mobile
        run: npx cap sync android

      - name: Decode keystore and configure signing
        working-directory: mobile
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "Configuring signed build..."
            mkdir -p android/app/keystores
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/keystores/release.keystore
            echo "✓ Keystore decoded"
          else
            echo "⚠️ No ANDROID_KEYSTORE_BASE64 secret — building debug APK"
            echo "To enable signed builds, add these GitHub Secrets:"
            echo "  ANDROID_KEYSTORE_BASE64 - base64 encoded keystore file"
            echo "  ANDROID_KEY_ALIAS - key alias (e.g. 'airone')"
            echo "  ANDROID_KEY_PASSWORD - key password"
            echo "  ANDROID_STORE_PASSWORD - store password"
          fi

      - name: Patch build.gradle for signing
        working-directory: mobile
        run: |
          APP_BUILD_GRADLE="android/app/build.gradle"

          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Patching build.gradle with signing config..."
            python3 << 'PYEOF'
          import sys

          gradle_file = "android/app/build.gradle"
          with open(gradle_file, "r") as f:
              content = f.read()

          # Add signing config before buildTypes
          signing_config = """
              signingConfigs {
                  release {
                      storeFile file('keystores/release.keystore')
                      storePassword System.getenv("ANDROID_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """

          if "signingConfigs" not in content:
              content = content.replace("buildTypes {", signing_config + "\n    buildTypes {")

          # Make release build type use signing config
          if "signingConfig signingConfigs.release" not in content:
              content = content.replace(
                  "release {",
                  "release {\n            signingConfig signingConfigs.release"
              )

          with open(gradle_file, "w") as f:
              f.write(content)

          print("✓ build.gradle patched with signing config")
          PYEOF
          else
            echo "Skipping signing config (no keystore secret)"
          fi

      - name: Customize Android project
        working-directory: mobile
        run: |
          # Update app name
          STRINGS_XML="android/app/src/main/res/values/strings.xml"
          if [ -f "${STRINGS_XML}" ]; then
            sed -i 's/<string name="app_name">[^<]*<\/string>/<string name="app_name">Airone IDE<\/string>/' "${STRINGS_XML}"
            sed -i 's/<string name="title_activity_main">[^<]*<\/string>/<string name="title_activity_main">Airone IDE<\/string>/' "${STRINGS_XML}"
            echo "✓ App name updated"
          fi

          # Add USB permissions for serial communication with ESP32
          MANIFEST_XML="android/app/src/main/AndroidManifest.xml"
          if [ -f "${MANIFEST_XML}" ]; then
            if ! grep -q "android.hardware.usb.host" "${MANIFEST_XML}"; then
              sed -i '/<application/i\    <uses-feature android:name="android.hardware.usb.host" android:required="false" />' "${MANIFEST_XML}"
            fi
            if ! grep -q "USB_PERMISSION" "${MANIFEST_XML}"; then
              sed -i '/<application/i\    <uses-permission android:name="android.permission.USB_PERMISSION" />' "${MANIFEST_XML}"
            fi
            echo "✓ USB permissions added to manifest"
          fi

          # Update colors for Airone branding
          COLORS_XML="android/app/src/main/res/values/colors.xml"
          mkdir -p android/app/src/main/res/values
          cat > "${COLORS_XML}" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0ea5e9</color>
              <color name="colorPrimaryDark">#0c4a6e</color>
              <color name="colorAccent">#38bdf8</color>
              <color name="backgroundColor">#1e1e2e</color>
          </resources>
          EOF
          echo "✓ Colors updated to Airone branding"

      - name: Build Android APK (signed release)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: mobile/android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Building SIGNED release APK..."
          ./gradlew assembleRelease

      - name: Build Android APK (debug)
        if: ${{ !secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: mobile/android
        run: |
          echo "Building DEBUG APK (unsigned)..."
          ./gradlew assembleDebug

      - name: Locate and prepare APK
        working-directory: mobile
        run: |
          echo "=== Looking for APK files ==="
          find android -name "*.apk" -type f 2>/dev/null

          APK_FILE=$(find android -name "*.apk" -type f | head -1)
          if [ -n "${APK_FILE}" ]; then
            mkdir -p dist
            cp "${APK_FILE}" "dist/AironeIDE.apk"
            echo "✓ APK ready: dist/AironeIDE.apk"
            ls -lh dist/AironeIDE.apk

            # Check if APK is signed
            if command -v apksigner &> /dev/null; then
              echo "=== APK Signing Info ==="
              apksigner verify --print-certs "dist/AironeIDE.apk" 2>/dev/null || echo "APK verification info not available"
            fi
          else
            echo "ERROR: No APK found!"
            find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
            exit 1
          fi

      - name: Upload Android APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Android
          path: mobile/dist/AironeIDE.apk
          retention-days: 30

      - name: Upload Android APK (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Android-PR
          path: mobile/dist/AironeIDE.apk
          retention-days: 5

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-android]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AironeIDE-Windows
          path: ./release-artifacts/windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AironeIDE-Linux
          path: ./release-artifacts/linux

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AironeIDE-Android
          path: ./release-artifacts/android

      - name: List release artifacts
        run: |
          echo "=== All release artifacts ==="
          find ./release-artifacts -type f | sort
          echo "=== Windows artifacts ==="
          ls -la ./release-artifacts/windows/ 2>/dev/null || echo "No windows artifacts"
          echo "=== Linux artifacts ==="
          ls -la ./release-artifacts/linux/ 2>/dev/null || echo "No linux artifacts"
          echo "=== Android artifacts ==="
          ls -la ./release-artifacts/android/ 2>/dev/null || echo "No android artifacts"

      - name: Verify update metadata files
        run: |
          echo "Checking for latest.yml (Windows auto-update)..."
          if [ -f "./release-artifacts/windows/latest.yml" ]; then
            echo "✓ latest.yml found:"
            cat ./release-artifacts/windows/latest.yml
          else
            echo "✗ latest.yml NOT found - auto-update will NOT work on Windows!"
          fi

          echo ""
          echo "Checking for latest-linux.yml (Linux auto-update)..."
          if [ -f "./release-artifacts/linux/latest-linux.yml" ]; then
            echo "✓ latest-linux.yml found:"
            cat ./release-artifacts/linux/latest-linux.yml
          else
            echo "✗ latest-linux.yml NOT found - auto-update will NOT work on Linux!"
          fi

      - name: Generate version tag
        id: version
        run: |
          # Read version from package.json
          VERSION=$(node -p "require('./applications/electron/package.json').version")
          # Create a timestamp-based build number for uniqueness
          BUILD_NUM=$(date +'%Y%m%d%H%M')
          TAG="v${VERSION}-build.${BUILD_NUM}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building release: ${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Airone IDE ${{ steps.version.outputs.tag }}"
          body: |
            ## Airone IDE ${{ steps.version.outputs.tag }}

            ### Downloads
            - **Windows**: `AironeIDESetup.exe` — Windows installer (NSIS)
            - **Linux**: `AironeIDE.AppImage` — Portable AppImage
            - **Linux**: `AironeIDE.deb` — Debian/Ubuntu package
            - **Android**: `AironeIDE.apk` — Android app (signed)

            ### Auto-Update
            This release includes `latest.yml` and `latest-linux.yml` for auto-update via `electron-updater`.
            Existing installations will automatically detect and offer this update.

            ### Android Installation
            1. Download `AironeIDE.apk` on your Android device
            2. Enable "Install from unknown sources" in Android Settings → Security
            3. Open the APK file to install
            4. The APK is signed and will install without "app not installed" errors

            ### Changes
            See commit history for changes since the last release.
          draft: false
          prerelease: false
          files: |
            ./release-artifacts/windows/*
            ./release-artifacts/linux/*
            ./release-artifacts/android/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
