name: Build Airone IDE

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with artifacts'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_nodejs_android:
        description: 'Attempt to build Node.js for Android ARM64 (takes 30-60 min)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Use Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install airo_compiler (optional)
        shell: bash
        run: pip install airo-compiler 2>/dev/null || echo "airo_compiler not available on PyPI yet, using built-in TypeScript verifier"
        continue-on-error: true

      - name: Install dependencies
        shell: bash
        run: yarn --skip-integrity-check --network-timeout 100000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Electron binary
        shell: bash
        run: |
          echo "Ensuring Electron binary is available..."
          if [ -f "node_modules/electron/dist/version" ]; then
            echo "Electron binary already exists: $(cat node_modules/electron/dist/version)"
          else
            echo "Electron binary not found, downloading directly..."
            mkdir -p node_modules/electron/dist
          cat > /tmp/download_electron.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          VERSION="v39.8.7"
          DIST_DIR="node_modules/electron/dist"
          if [ "$RUNNER_OS" = "Windows" ]; then
            FILE="electron-${VERSION}-win32-x64.zip"
          else
            FILE="electron-${VERSION}-linux-x64.zip"
          fi
          URL="https://github.com/electron/electron/releases/download/${VERSION}/${FILE}"
          echo "Downloading ${URL}..."
          curl -L --retry 3 -o /tmp/electron.zip "${URL}"
          echo "Extracting to ${DIST_DIR}..."
          unzip -o /tmp/electron.zip -d "${DIST_DIR}"
          echo "${VERSION#v}" > "${DIST_DIR}/version"
          echo "Downloaded Electron ${VERSION}"
          SCRIPT
          bash /tmp/download_electron.sh
          fi
          echo "Final Electron version: $(cat node_modules/electron/dist/version 2>/dev/null || echo 'FAILED')"

      - name: Build extensions
        shell: bash
        run: yarn build:extensions
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build application
        shell: bash
        run: yarn build:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugins
        shell: bash
        run: yarn download:plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Windows
        shell: bash
        run: yarn package:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist contents
        shell: bash
        run: |
          echo "=== Dist directory contents ==="
          ls -la applications/electron/dist/ 2>/dev/null || echo "dist dir not found"
          echo "=== Looking for latest.yml ==="
          find applications/electron/dist -name "latest*.yml" -type f 2>/dev/null || echo "No yml files found"

      - name: Generate latest.yml if missing
        shell: bash
        run: |
          DIST_DIR="applications/electron/dist"
          if [ ! -f "${DIST_DIR}/latest.yml" ]; then
            echo "latest.yml not found, generating it..."
            EXE_FILE=$(ls ${DIST_DIR}/*.exe 2>/dev/null | head -1)
            if [ -n "$EXE_FILE" ]; then
              EXE_NAME=$(basename "$EXE_FILE")
              EXE_SIZE=$(stat -c%s "$EXE_FILE" 2>/dev/null || wc -c < "$EXE_FILE")
              SHA512=$(sha512sum "$EXE_FILE" | cut -d' ' -f1)
              cat > "${DIST_DIR}/latest.yml" << EOF
          version: $(node -p "require('./applications/electron/package.json').version")
          files:
            - url: ${EXE_NAME}
              sha512: ${SHA512}
              size: ${EXE_SIZE}
          path: ${EXE_NAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'
          EOF
              echo "Generated latest.yml:"
              cat "${DIST_DIR}/latest.yml"
            else
              echo "WARNING: No exe file found in dist directory"
            fi
          else
            echo "latest.yml already exists:"
            cat "${DIST_DIR}/latest.yml"
          fi

      - name: Upload Windows Installer
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Windows
          path: |
            applications/electron/dist/*.exe
            applications/electron/dist/*.blockmap
            applications/electron/dist/latest.yml
          retention-days: 30

      - name: Upload Windows Installer (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Windows-PR
          path: |
            applications/electron/dist/*.exe
          retention-days: 5

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev libx11-dev libsecret-1-dev libfontconfig1

      - name: Use Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install airo_compiler (optional)
        run: pip install airo-compiler 2>/dev/null || echo "airo_compiler not available on PyPI yet, using built-in TypeScript verifier"
        continue-on-error: true

      - name: Install dependencies
        shell: bash
        run: yarn --skip-integrity-check --network-timeout 100000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Electron binary
        shell: bash
        run: |
          echo "Ensuring Electron binary is available..."
          if [ -f "node_modules/electron/dist/version" ]; then
            echo "Electron binary already exists: $(cat node_modules/electron/dist/version)"
          else
            echo "Electron binary not found, downloading directly..."
            mkdir -p node_modules/electron/dist
            VERSION="v39.8.7"
            FILE="electron-${VERSION}-linux-x64.zip"
            URL="https://github.com/electron/electron/releases/download/${VERSION}/${FILE}"
            echo "Downloading ${URL}..."
            curl -L --retry 3 -o /tmp/electron.zip "${URL}"
            echo "Extracting to node_modules/electron/dist..."
            unzip -o /tmp/electron.zip -d node_modules/electron/dist
            echo "39.8.7" > node_modules/electron/dist/version
            echo "Downloaded Electron ${VERSION}"
          fi
          echo "Final Electron version: $(cat node_modules/electron/dist/version 2>/dev/null || echo 'FAILED')"

      - name: Build extensions
        shell: bash
        run: yarn build:extensions
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build application
        shell: bash
        run: yarn build:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugins
        shell: bash
        run: yarn download:plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Linux
        shell: bash
        run: yarn package:applications
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist contents
        shell: bash
        run: |
          echo "=== Dist directory contents ==="
          ls -la applications/electron/dist/ 2>/dev/null || echo "dist dir not found"
          echo "=== Looking for latest-linux.yml ==="
          find applications/electron/dist -name "latest*.yml" -type f 2>/dev/null || echo "No yml files found"

      - name: Generate latest-linux.yml if missing
        shell: bash
        run: |
          DIST_DIR="applications/electron/dist"
          if [ ! -f "${DIST_DIR}/latest-linux.yml" ]; then
            echo "latest-linux.yml not found, generating it..."
            APPIMAGE_FILE=$(ls ${DIST_DIR}/*.AppImage 2>/dev/null | head-1)
            if [ -n "$APPIMAGE_FILE" ]; then
              APPIMAGE_NAME=$(basename "$APPIMAGE_FILE")
              APPIMAGE_SIZE=$(stat -c%s "$APPIMAGE_FILE" 2>/dev/null || wc -c < "$APPIMAGE_FILE")
              SHA512=$(sha512sum "$APPIMAGE_FILE" | cut -d' ' -f1)
              cat > "${DIST_DIR}/latest-linux.yml" << EOF
          version: $(node -p "require('./applications/electron/package.json').version")
          files:
            - url: ${APPIMAGE_NAME}
              sha512: ${SHA512}
              size: ${APPIMAGE_SIZE}
          path: ${APPIMAGE_NAME}
          sha512: ${SHA512}
          releaseDate: '$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")'
          EOF
              echo "Generated latest-linux.yml:"
              cat "${DIST_DIR}/latest-linux.yml"
            else
              echo "WARNING: No AppImage file found in dist directory"
            fi
          else
            echo "latest-linux.yml already exists:"
            cat "${DIST_DIR}/latest-linux.yml"
          fi

      - name: Upload Linux AppImage
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Linux
          path: |
            applications/electron/dist/*.AppImage
            applications/electron/dist/*.deb
            applications/electron/dist/latest-linux.yml
          retention-days: 30

  # ==========================================================================
  # Node.js for Android ARM64 — Build from source using Android NDK
  # ==========================================================================
  # This job compiles Node.js for Android ARM64 using the NDK toolchain.
  # The resulting binary is uploaded as an artifact and used by the Android
  # build job. This is a time-consuming process (30-60 minutes).
  #
  # When a pre-built Node.js binary is available (e.g., cached from a
  # previous build or downloaded from a release), this step can be skipped.
  #
  # PREREQUISITES:
  # - Android NDK r25+ with clang toolchain
  # - Node.js source code (specific version)
  # - Cross-compilation configure flags for Android
  #
  # ALTERNATIVE APPROACHES:
  # 1. Download from Termux package repository (pre-built for Android)
  # 2. Use nodejs-mobile pre-built binaries
  # 3. Cache the compiled binary in GitHub Releases or Actions cache
  # ==========================================================================
  build-nodejs-android:
    name: Build Node.js for Android
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    if: github.event.inputs.build_nodejs_android == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and build tools
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Clone Node.js source
        run: |
          git clone --depth 1 --branch v20.11.1 https://github.com/nodejs/node.git /tmp/nodejs-source
          cd /tmp/nodejs-source

      - name: Configure Node.js for Android ARM64
        working-directory: /tmp/nodejs-source
        run: |
          export NDK_HOME=$ANDROID_NDK_HOME
          export TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=24

          export CC=$TOOLCHAIN/bin/$TARGET$API-clang
          export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export NM=$TOOLCHAIN/bin/llvm-nm
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"

          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --without-intl \
            --without-inspector \
            --without-dtrace \
            --without-etw \
            --without-npm \
            --ninja \
            --prefix=/tmp/nodejs-install

      - name: Build Node.js
        working-directory: /tmp/nodejs-source
        run: |
          make -j$(nproc)

      - name: Strip and verify binary
        working-directory: /tmp/nodejs-source
        run: |
          export STRIP=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP -s out/Release/node
          file out/Release/node
          ls -lh out/Release/node

      - name: Upload Node.js binary
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-android-arm64
          path: /tmp/nodejs-source/out/Release/node
          retention-days: 30

  build-android:
    name: Android Build
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: [build-nodejs-android]
    # Always run even if Node.js build was skipped
    if: always() && !cancelled()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev libx11-dev libsecret-1-dev libfontconfig1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        shell: bash
        run: yarn --skip-integrity-check --network-timeout 100000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build extensions
        shell: bash
        run: yarn build:extensions
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build browser application
        shell: bash
        run: yarn --cwd applications/browser build:prod
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download plugins
        shell: bash
        run: yarn download:plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Capacitor
        working-directory: applications/browser
        run: npx cap sync android

      # ======================================================================
      # Copy the Theia backend files to Android assets
      # These files are extracted by NodeJsBackendService at runtime
      # and run by the Node.js process (when available)
      # ======================================================================
      - name: Copy backend files to assets
        run: |
          ASSETS_BACKEND="applications/browser/android/app/src/main/assets/backend"
          mkdir -p "${ASSETS_BACKEND}"
          if [ -d "applications/browser/lib/backend" ]; then
            echo "Copying Theia backend files..."
            # Copy main.js and all backend dependencies
            rsync -a --exclude='*.map' --exclude='.git' --exclude='*.md' \
              applications/browser/lib/backend/ "${ASSETS_BACKEND}/"
            echo "Backend files copied:"
            find "${ASSETS_BACKEND}" -type f | head -20
            echo "Total size: $(du -sh "${ASSETS_BACKEND}" | cut -f1)"
          else
            echo "WARNING: Backend directory not found (lib/backend/)"
            echo "The app will work in remote backend mode only"
            echo "# Backend files will be added here" > "${ASSETS_BACKEND}/.gitkeep"
          fi

      # ======================================================================
      # Download or prepare Node.js binary for Android ARM64
      #
      # The Node.js binary needs to be compiled for Android ARM64 using the NDK.
      # Options:
      # 1. Download from the build-nodejs-android job artifact (if it ran)
      # 2. Download from a previous GitHub Release
      # 3. Use a cached binary from Actions cache
      #
      # If no binary is available, the app works in "remote backend" mode
      # where users connect to a Theia backend running on their network.
      # ======================================================================
      - name: Download Node.js binary for Android (from build job)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: nodejs-android-arm64
          path: /tmp/nodejs-android

      - name: Setup Node.js binary in assets
        run: |
          NODEJS_ASSETS_DIR="applications/browser/android/app/src/main/assets/nodejs/bin"
          mkdir -p "${NODEJS_ASSETS_DIR}"

          if [ -f "/tmp/nodejs-android/node" ]; then
            echo "Node.js binary found from build job!"
            cp /tmp/nodejs-android/node "${NODEJS_ASSETS_DIR}/node"
            chmod +x "${NODEJS_ASSETS_DIR}/node"
            file "${NODEJS_ASSETS_DIR}/node"
            ls -lh "${NODEJS_ASSETS_DIR}/node"
            echo "✓ Node.js binary for Android ARM64 is bundled"
          else
            echo "Node.js binary not available from build job."
            echo "The app will work in 'remote backend' mode."
            echo ""
            echo "To add Node.js for Android ARM64:"
            echo "1. Compile using NDK: see scripts/build-nodejs-android.sh"
            echo "2. Or download from a previous release"
            echo "3. Place at: ${NODEJS_ASSETS_DIR}/node"
            echo ""
            echo "# Node.js binary for Android ARM64 placeholder" > "${NODEJS_ASSETS_DIR}/.gitkeep"
          fi

      - name: Decode keystore
        working-directory: applications/browser
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "Decoding keystore..."
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android-signing/airone-ide-release.keystore
            echo "Keystore decoded successfully"
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret - building debug APK"
          fi

      - name: Build Android APK
        working-directory: applications/browser/android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f "../android-signing/airone-ide-release.keystore" ]; then
            echo "Building SIGNED release APK..."
            ./gradlew assembleRelease
          else
            echo "Building DEBUG APK (no keystore)..."
            ./gradlew assembleDebug
          fi

      - name: Locate and prepare APK
        working-directory: applications/browser
        run: |
          echo "Looking for APK files..."
          find android -name "*.apk" -type f 2>/dev/null

          APK_FILE=$(find android -name "*.apk" -type f | head -1)
          if [ -n "${APK_FILE}" ]; then
            mkdir -p dist
            cp "${APK_FILE}" "dist/AironeIDE.apk"
            echo "APK ready: dist/AironeIDE.apk"
            ls -lh dist/AironeIDE.apk
          else
            echo "ERROR: No APK found!"
            find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
            exit 1
          fi

      - name: Upload Android APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Android
          path: applications/browser/dist/AironeIDE.apk
          retention-days: 30

      - name: Upload Android APK (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AironeIDE-Android-PR
          path: applications/browser/dist/AironeIDE.apk
          retention-days: 5

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-android]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AironeIDE-Windows
          path: ./release-artifacts/windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AironeIDE-Linux
          path: ./release-artifacts/linux

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AironeIDE-Android
          path: ./release-artifacts/android

      - name: List release artifacts
        run: |
          echo "=== All release artifacts ==="
          find ./release-artifacts -type f | sort
          echo "=== Windows artifacts ==="
          ls -la ./release-artifacts/windows/ 2>/dev/null || echo "No windows artifacts"
          echo "=== Linux artifacts ==="
          ls -la ./release-artifacts/linux/ 2>/dev/null || echo "No linux artifacts"
          echo "=== Android artifacts ==="
          ls -la ./release-artifacts/android/ 2>/dev/null || echo "No android artifacts"

      - name: Verify update metadata files
        run: |
          echo "Checking for latest.yml (Windows auto-update)..."
          if [ -f "./release-artifacts/windows/latest.yml" ]; then
            echo "latest.yml found:"
            cat ./release-artifacts/windows/latest.yml
          else
            echo "latest.yml NOT found - auto-update will NOT work on Windows!"
          fi

          echo ""
          echo "Checking for latest-linux.yml (Linux auto-update)..."
          if [ -f "./release-artifacts/linux/latest-linux.yml" ]; then
            echo "latest-linux.yml found:"
            cat ./release-artifacts/linux/latest-linux.yml
          else
            echo "latest-linux.yml NOT found - auto-update will NOT work on Linux!"
          fi

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(node -p "require('./applications/electron/package.json').version")
          BUILD_NUM=$(date +'%Y%m%d%H%M')
          TAG="v${VERSION}-build.${BUILD_NUM}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building release: ${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Airone IDE ${{ steps.version.outputs.tag }}"
          body: |
            ## Airone IDE ${{ steps.version.outputs.tag }}

            ### Downloads
            - **Windows**: `AironeIDESetup.exe` — Windows installer (NSIS)
            - **Linux**: `AironeIDE.AppImage` — Portable AppImage
            - **Linux**: `AironeIDE.deb` — Debian/Ubuntu package
            - **Android**: `AironeIDE.apk` — Android app (signed)

            ### Auto-Update
            This release includes `latest.yml` and `latest-linux.yml` for auto-update via `electron-updater`.
            Existing installations will automatically detect and offer this update.

            ### Android Installation
            1. Download `AironeIDE.apk` on your Android device
            2. Enable "Install from unknown sources" in Android Settings → Security
            3. Open the APK file to install
            4. The APK is signed and will install without "app not installed" errors

            ### Android Usage
            The Android app supports two modes:

            **Local Backend Mode** (when Node.js for Android is bundled):
            - The IDE runs entirely on your device
            - A local Node.js backend starts automatically
            - Full IDE features available offline

            **Remote Backend Mode** (current default):
            - The app shows a "Connect to Backend" screen
            - Enter the URL of a Theia backend running on your network (e.g., `http://192.168.1.100:3000`)
            - To start a Theia backend on your computer: `yarn --cwd applications/browser start`
            - The backend provides all IDE services (file management, compilation, terminal, etc.)

            ### Changes
            See commit history for changes since the last release.
          draft: false
          prerelease: false
          files: |
            ./release-artifacts/windows/*
            ./release-artifacts/linux/*
            ./release-artifacts/android/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
