name: Build Airone IDE for Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0-alpha)'
        required: true
        default: '0.2.0-alpha'
      is_release:
        description: 'Is this a release build? (true/false)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '18.20.4'
  PYTHON_VERSION: '3.11'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Yarn
        run: npm install -g yarn@1.22.19

      - name: Check versions
        run: |
          node --version
          yarn --version
          python --version

      - name: Install dependencies
        run: yarn install --network-timeout 600000
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # CRITICAL: Rebuild native modules for Electron.
      # Without this step, native .node modules (keytar, drivelist, node-pty, etc.)
      # are compiled for Node.js instead of Electron 30, causing ABI mismatch.
      # The Theia backend crashes silently when loading incompatible native modules,
      # resulting in a stuck splash screen because the frontend has no backend to connect to.
      - name: Rebuild native modules for Electron
        working-directory: electron-app
        run: |
          Write-Host "=== Rebuilding native modules for Electron ==="
          yarn rebuild
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Native module rebuild failed! This will cause the backend to crash."
            exit 1
          }
          Write-Host "=== Rebuild completed successfully ==="
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # Verify that native modules are compiled for the correct ABI (Electron, not Node.js)
      - name: Verify native module ABI compatibility
        run: |
          Write-Host "=== Verifying native module ABI compatibility ==="
          $electronVersion = "30.1.2"

          # Check keytar
          $keytarPath = Get-ChildItem -Path "node_modules" -Filter "keytar.node" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($keytarPath) {
            Write-Host "Found keytar native module: $($keytarPath.FullName)"
          } else {
            Write-Host "WARNING: keytar native module not found in node_modules"
          }

          # Check drivelist
          $drivelistPath = Get-ChildItem -Path "node_modules" -Filter "drivelist.node" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($drivelistPath) {
            Write-Host "Found drivelist native module: $($drivelistPath.FullName)"
          } else {
            Write-Host "NOTE: drivelist native module not found (may not have native bindings on this platform)"
          }

          # List all .node files to verify they exist
          Write-Host "=== All native .node modules found ==="
          Get-ChildItem -Path "node_modules" -Filter "*.node" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }

          # Verify the Electron ABI version
          Write-Host "=== Electron ABI verification ==="
          Write-Host "Electron version: $electronVersion"
          $nodeAbiVersion = node -e "console.log(process.versions.modules)"
          Write-Host "Node.js ABI version (system): $nodeAbiVersion"

      - name: Build the application
        run: yarn build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # Verify that the build output contains the expected files
      - name: Verify build output
        run: |
          Write-Host "=== Verifying build output ==="
          $electronMainJs = "electron-app/lib/backend/electron-main.js"
          $backendMainJs = "electron-app/lib/backend/main.js"
          $frontendIndexHtml = "electron-app/lib/frontend/index.html"

          $missingFiles = @()
          if (-not (Test-Path $electronMainJs)) { $missingFiles += $electronMainJs }
          if (-not (Test-Path $backendMainJs)) { $missingFiles += $backendMainJs }
          if (-not (Test-Path $frontendIndexHtml)) { $missingFiles += $frontendIndexHtml }

          if ($missingFiles.Count -gt 0) {
            Write-Host "ERROR: Required build output files are missing:"
            $missingFiles | ForEach-Object { Write-Host "  $_" }
            exit 1
          }

          Write-Host "All required build output files exist:"
          Write-Host "  $electronMainJs"
          Write-Host "  $backendMainJs"
          Write-Host "  $frontendIndexHtml"

      - name: Package for Windows (NSIS installer .exe)
        working-directory: electron-app
        run: yarn package
        env:
          IS_RELEASE: ${{ github.event.inputs.is_release }}
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Post-package processing
        working-directory: electron-app
        run: yarn postpackage
        env:
          IS_RELEASE: ${{ github.event.inputs.is_release }}

      - name: Find built artifact
        id: find_artifact
        run: |
          $exe = Get-ChildItem -Path "electron-app\dist" -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "*blockmap*" } | Select-Object -First 1
          if ($exe) {
            Write-Host "Found artifact: $($exe.FullName)"
            Write-Host "Artifact size: $([math]::Round($exe.Length / 1MB, 2)) MB"
            "artifact_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            "artifact_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ERROR: No .exe found in electron-app/dist"
            Get-ChildItem -Path "electron-app\dist" -Recurse
            exit 1
          }

      - name: Delete old release asset if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"
          try {
            $release = gh release view $tag --json id 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Deleting existing release for tag $tag"
              gh release delete $tag --yes
            }
          } catch {
            Write-Host "No existing release found for tag $tag"
          }
          try {
            git tag -d $tag 2>$null
            git push origin :refs/tags/$tag 2>$null
          } catch {}

      - name: Upload artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Airone IDE v${{ github.event.inputs.version }}
          body: |
            ## Airone IDE v${{ github.event.inputs.version }}

            ### System Requirements
            - Windows 10/11 (64-bit)
            - Python 3.x installed and available on PATH (for .airo compilation)

            ### Installation
            1. Download `Airone-IDE-*.exe` below
            2. Run the installer .exe
            3. Follow the installation wizard
            4. Launch Airone IDE from the Start menu

            ### What's Included
            - Full Arduino IDE 2.x functionality
            - .airo language support (syntax highlighting, snippets)
            - Built-in Airo Compiler (.airo → C++ for ESP32)
            - Airone Backbone sync integration
          files: |
            ${{ steps.find_artifact.outputs.artifact_path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Airone-IDE-windows-exe
          path: ${{ steps.find_artifact.outputs.artifact_path }}
          retention-days: 7
