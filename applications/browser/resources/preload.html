<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html, body { background-color: #1e1e2e; margin: 0; padding: 0; }
        .theia-preload { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: none; display: flex; align-items: center; justify-content: center; }
        .theia-preload::after { content: none; }
        .backend-status { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .status-spinner { width: 24px; height: 24px; border: 2px solid #333; border-top: 2px solid #27ae60; border-radius: 50%; animation: spin 1s linear infinite; }
        .status-text { color: #888; font-family: sans-serif; font-size: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="theia-preload">
        <div class="backend-status">
            <div class="status-spinner"></div>
            <div class="status-text">Starting backend...</div>
        </div>
        <script>
            // Check backend availability and show config if needed
            (function() {
                var checkInterval;
                var attempts = 0;
                var maxAttempts = 60; // 60 seconds
                
                function checkBackend() {
                    fetch('http://localhost:3000', { method: 'HEAD', mode: 'no-cors' })
                        .then(function() {
                            // Backend is ready, Theia will connect automatically
                            clearInterval(checkInterval);
                            document.querySelector('.status-text').textContent = 'Connecting...';
                        })
                        .catch(function() {
                            attempts++;
                            if (attempts >= maxAttempts) {
                                clearInterval(checkInterval);
                                showBackendConfig();
                            }
                        });
                }
                
                function showBackendConfig() {
                    var statusDiv = document.querySelector('.backend-status');
                    statusDiv.innerHTML = '<div style="color:#27ae60;font-family:sans-serif;font-size:16px;font-weight:bold;">Airone IDE</div>' +
                        '<div style="color:#888;font-family:sans-serif;font-size:12px;margin-bottom:16px;">Local backend not available</div>' +
                        '<div style="color:#aaa;font-family:sans-serif;font-size:11px;margin-bottom:8px;">Connect to a Theia backend on your network:</div>' +
                        '<input id="backend-url" type="text" placeholder="http://192.168.1.100:3000" ' +
                        'style="width:250px;padding:8px;border:1px solid #444;background:#2a2a3a;color:#fff;border-radius:4px;font-size:14px;" />' +
                        '<button onclick="connectToBackend()" ' +
                        'style="padding:8px 24px;background:#27ae60;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;margin-top:8px;">Connect</button>';
                }
                
                window.connectToBackend = function() {
                    var url = document.getElementById('backend-url').value.trim();
                    if (url) {
                        window.location.href = url;
                    }
                };
                
                // Start checking after 3 seconds (give backend time to start)
                setTimeout(function() {
                    checkInterval = setInterval(checkBackend, 1000);
                }, 3000);
            })();
        </script>
    </div>
</body>

</html>
