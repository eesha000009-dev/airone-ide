appId: com.airone.ide
productName: AironeIDE
copyright: Copyright © 2025 Airone
electronDist: ../../node_modules/electron/dist
electronVersion: 39.8.7
asar: true
asarUnpack:
  - "**/lib/backend/native/**"
  - "**/lib/backend/shell-integrations/**"
  - "**/lib/prebuilds/**"
nodeGypRebuild: false
npmRebuild: false

directories:
  buildResources: resources

# node_modules and package.json are copied automatically
# Exclude node_modules manually because electron is copied by electron-builder and we are using a bundled backend
files:
  - src-gen
  - lib
  - resources/icons/WindowIcon/512-512.png
  - resources/AironeIDESplash.svg
  - scripts
  - "!**node_modules/**"
extraResources:
  - from: ../../plugins
    to: app/plugins
  - from: ../../airo-compiler
    to: airo-compiler

# ─── Auto-Update Configuration ──────────────────────────────────────────────
# Publishing to GitHub Releases for auto-update support via electron-updater

publish:
  provider: github
  owner: eesha000009-dev
  repo: airone-ide
  releaseType: release

win:
  icon: resources/icons/airone-icon.ico
  target:
    - nsis
mac:
  icon: resources/icons/MacLauncherIcons/icon.icns
  category: public.app-category.developer-tools
  protocols:
    - name: airone
      schemes:
        - airone
  darkModeSupport: true
  target:
    - dmg
    - zip
linux:
  icon: resources/icons/LinuxLauncherIcons
  category: Development
  mimeTypes:
    - inode/directory
  vendor: Airone
  target:
    - deb
    - AppImage

nsis:
  menuCategory: true
  oneClick: false
  perMachine: false
  installerHeaderIcon: resources/icons/airone-icon.ico
  installerHeader: resources/icons/installer-header-banner.bmp
  installerIcon: resources/icons/airone-icon.ico
  uninstallerIcon: resources/icons/airone-icon.ico
  installerSidebar: resources/icons/InstallerSidebarImage/164-314Windows.bmp
  uninstallerSidebar: resources/icons/InstallerSidebarImage/164-314Windows.bmp
  allowToChangeInstallationDirectory: true
  runAfterFinish: false
  artifactName: ${productName}Setup.${ext}
  license: LICENSE
dmg:
  artifactName: ${productName}.${ext}
deb:
  artifactName: ${productName}.${ext}
appImage:
  artifactName: ${productName}.${ext}

afterPack: ./scripts/after-pack.js
