<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#27ae60"/>
  <!-- Circuit/Chip pattern -->
  <rect x="30" y="30" width="68" height="68" rx="6" fill="none" stroke="white" stroke-width="3"/>
  <!-- Chip pins left -->
  <line x1="30" y1="45" x2="18" y2="45" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="58" x2="18" y2="58" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="71" x2="18" y2="71" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="84" x2="18" y2="84" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Chip pins right -->
  <line x1="98" y1="45" x2="110" y2="45" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="58" x2="110" y2="58" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="71" x2="110" y2="71" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="84" x2="110" y2="84" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Chip pins top -->
  <line x1="45" y1="30" x2="45" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="30" x2="58" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="71" y1="30" x2="71" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="84" y1="30" x2="84" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Chip pins bottom -->
  <line x1="45" y1="98" x2="45" y2="110" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="98" x2="58" y2="110" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="71" y1="98" x2="71" y2="110" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="84" y1="98" x2="84" y2="110" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="white" opacity="0.6"/>
  <!-- Text A -->
  <text x="64" y="73" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">A</text>
</svg>
